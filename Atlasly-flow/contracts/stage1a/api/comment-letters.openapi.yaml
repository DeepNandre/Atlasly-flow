openapi: 3.1.0
info:
  title: Stage 1A Comment Letters API
  version: 1.0.0
  description: Contract spec for Stage 1A comment extraction endpoints.
paths:
  /comment-letters:
    post:
      summary: Upload comment letter and start extraction pipeline
      operationId: createCommentLetter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCommentLetterRequest'
      responses:
        '202':
          description: Accepted for asynchronous extraction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLetterAccepted'
  /comment-letters/{letterId}:
    get:
      summary: Retrieve parse status and summary
      operationId: getCommentLetter
      parameters:
        - $ref: '#/components/parameters/LetterId'
      responses:
        '200':
          description: Letter status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentLetterStatus'
  /comment-letters/{letterId}/extractions:
    get:
      summary: List extraction candidates for letter
      operationId: listCommentExtractions
      parameters:
        - $ref: '#/components/parameters/LetterId'
      responses:
        '200':
          description: Extraction records
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommentExtractionsResponse'
  /comment-letters/{letterId}/approve:
    post:
      summary: Approve corrected extraction set and finalize immutable snapshot
      operationId: approveCommentLetter
      parameters:
        - $ref: '#/components/parameters/LetterId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveCommentLetterRequest'
      responses:
        '200':
          description: Approved snapshot metadata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApproveCommentLetterResponse'
components:
  parameters:
    LetterId:
      name: letterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    CreateCommentLetterRequest:
      type: object
      additionalProperties: false
      required: [project_id, document_id]
      properties:
        project_id:
          type: string
          format: uuid
        document_id:
          type: string
          format: uuid
        idempotency_key:
          type: string
          minLength: 8
          maxLength: 255
    CommentLetterAccepted:
      type: object
      additionalProperties: false
      required: [letter_id, status]
      properties:
        letter_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ingest_received, ocr_precheck, ocr_processing, extracting_comments, normalizing_validating, review_queueing, human_review, approval_snapshot, completed, failed_extraction]
    CommentLetterStatus:
      type: object
      additionalProperties: false
      required: [letter_id, status, extraction_count, avg_confidence, requires_review_count]
      properties:
        letter_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [ingest_received, ocr_precheck, ocr_processing, extracting_comments, normalizing_validating, review_queueing, human_review, approval_snapshot, completed, failed_extraction]
        extraction_count:
          type: integer
          minimum: 0
        avg_confidence:
          type: number
          minimum: 0
          maximum: 1
        requires_review_count:
          type: integer
          minimum: 0
    CommentExtractionsResponse:
      type: object
      additionalProperties: false
      required: [letter_id, extractions]
      properties:
        letter_id:
          type: string
          format: uuid
        extractions:
          type: array
          items:
            $ref: '#/components/schemas/CommentExtraction'
    CommentExtraction:
      type: object
      additionalProperties: false
      required: [comment_id, raw_text, discipline, severity, requested_action, code_reference, page_number, confidence, status]
      properties:
        comment_id:
          type: string
          pattern: '^cmt_[0-9]+_[a-f0-9]{12}$'
        raw_text:
          type: string
          minLength: 20
          maxLength: 4000
        discipline:
          type: string
          enum: [structural, electrical, plumbing, mechanical, fire, zoning, civil, architectural, energy, accessibility, other]
        severity:
          type: string
          enum: [critical, major, minor, info]
        requested_action:
          type: string
          minLength: 10
          maxLength: 1000
        code_reference:
          type: string
        page_number:
          type: integer
          minimum: 1
        confidence:
          type: number
          minimum: 0
          maximum: 1
        status:
          type: string
          enum: [auto_accepted, needs_review, reviewed_corrected, approved_snapshot]
    ApproveCommentLetterRequest:
      type: object
      additionalProperties: false
      description: No actor fields accepted. Approver identity is derived from authenticated user context.
    ApproveCommentLetterResponse:
      type: object
      additionalProperties: false
      required: [letter_id, approved_by, approved_at, snapshot_id]
      properties:
        letter_id:
          type: string
          format: uuid
        approved_by:
          type: string
          format: uuid
        approved_at:
          type: string
          format: date-time
        snapshot_id:
          type: string
          format: uuid
