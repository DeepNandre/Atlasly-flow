name: atlasly-ci

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - "codex/**"

jobs:
  gates:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run MVP hard gates
        run: bash scripts/mvp-gates.sh
