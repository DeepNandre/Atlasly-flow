openapi: 3.1.0
info:
  title: Stage 0.5 Organization API Keys API
  version: 1.0.0
paths:
  /orgs/{orgId}/api-keys:
    post:
      summary: Create scoped API credential
      operationId: createOrgApiKey
      parameters:
        - in: path
          name: orgId
          required: true
          schema:
            type: string
            format: uuid
        - in: header
          name: Idempotency-Key
          required: true
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, scopes]
              properties:
                name:
                  type: string
                scopes:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    enum:
                      [
                        webhooks:read,
                        webhooks:write,
                        connectors:read,
                        connectors:run,
                        dashboard:read,
                        tasks:read,
                        tasks:write,
                        audit:read
                      ]
                expires_at:
                  type: string
                  format: date-time
      responses:
        "201":
          description: Key created (one-time plaintext returned)
        "200":
          description: Idempotent replay (plaintext omitted)
        "403":
          description: Forbidden
        "422":
          description: Validation error
