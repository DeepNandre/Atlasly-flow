openapi: 3.1.0
info:
  title: Stage 2 Permit Status Timeline API
  version: 1.0.0
paths:
  /permits/{permitId}/status-timeline:
    get:
      summary: Read normalized status timeline with provenance
      operationId: getPermitStatusTimeline
      parameters:
        - in: path
          name: permitId
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        "200":
          description: Timeline records
          content:
            application/json:
              schema:
                type: object
                required: [permit_id, timeline]
                properties:
                  permit_id:
                    type: string
                    format: uuid
                  timeline:
                    type: array
                    items:
                      type: object
                      required:
                        [
                          event_id,
                          observed_at,
                          raw_status,
                          normalized_status,
                          confidence,
                          source,
                          provenance
                        ]
                      properties:
                        event_id:
                          type: string
                          format: uuid
                        observed_at:
                          type: string
                          format: date-time
                        raw_status:
                          type: string
                        normalized_status:
                          type: string
                          enum:
                            [submitted, in_review, corrections_required, approved, issued, expired]
                        confidence:
                          type: number
                          minimum: 0
                          maximum: 1
                        source:
                          type: string
                        provenance:
                          type: object
                          required: [source_type, source_ref, source_payload_hash]
                          properties:
                            source_type:
                              type: string
                              enum: [api, portal, vendor, manual]
                            source_ref:
                              type: string
                            source_payload_hash:
                              type: string
                        parser_version:
                          type: string
        "404":
          description: Permit not found
        "422":
          description: Invalid query parameters
